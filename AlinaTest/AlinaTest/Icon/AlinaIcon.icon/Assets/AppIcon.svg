<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>

    <!-- Brand gradient: electric blue → purple → hot pink (bottom-left → top-right) -->
    <linearGradient id="brandGrad" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#5B9EF9"/>
      <stop offset="40%"  stop-color="#8955F9"/>
      <stop offset="75%"  stop-color="#B24DCC"/>
      <stop offset="100%" stop-color="#FF4DC4"/>
    </linearGradient>

    <!-- Subtle radial background lift -->
    <radialGradient id="bgGrad" cx="50%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#23212C"/>
      <stop offset="100%" stop-color="#18161F"/>
    </radialGradient>

    <!-- Glow: two blur passes merged with source so strokes bloom -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"  result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>

  <!-- "A" lettermark — three rounded stroke lines, brand gradient + glow -->
  <g filter="url(#glow)" stroke="url(#brandGrad)" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Left diagonal: top-centre → bottom-left -->
    <line x1="512" y1="172" x2="212" y2="852" stroke-width="72"/>

    <!-- Right diagonal: top-centre → bottom-right -->
    <line x1="512" y1="172" x2="812" y2="852" stroke-width="72"/>

    <!-- Crossbar at approx. 57 % of the height -->
    <line x1="320" y1="608" x2="704" y2="608" stroke-width="72"/>

  </g>

</svg>
